services:
  - type: web
    name: dispensa-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dispensa-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RECIPE_AI_PROVIDER
        value: openrouter
      - key: OPENROUTER_MODEL
        value: google/gemma-3-4b-it:free

databases:
  - name: dispensa-db
    plan: free
    databaseName: dispensa
